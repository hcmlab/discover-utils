name: Build Sphinx-API Docs
on: [push, pull_request, workflow_dispatch]
permissions:
    contents: write
jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - name: Install dependencies
        run: |
          pip install sphinx sphinx_rtd_theme myst-parser sphinx-argparse
          pip install -e . --no-deps
      - name: Sphinx build
        run: |
          sphinx-build docs/docsource docs/docbuild
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        # peaceiris/actions-gh-pages has no Node 24 release yet; opt its
        # Node 20 runtime into Node 24 ahead of the June 2026 forced cutoff.
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        with:
          publish_branch: gh-pages
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/docbuild/
          force_orphan: true
